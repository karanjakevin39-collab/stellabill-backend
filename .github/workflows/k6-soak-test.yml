name: K6 Soak Test - Statements

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Test duration (e.g., 1h, 30m, 5m)'
        required: false
        default: '1h'
      vus:
        description: 'Virtual Users'
        required: false
        default: '50'
      environment:
        description: 'Test environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  soak-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run Soak Test
        env:
          BASE_URL: ${{ secrets[format('K6_{0}_BASE_URL', github.event.inputs.environment)] }}
          API_KEY: ${{ secrets[format('K6_{0}_API_KEY', github.event.inputs.environment)] }}
        run: |
          k6 run tests/k6/statements_soak.js \
            --duration=${{ github.event.inputs.duration }} \
            --vus=${{ github.event.inputs.vus }} \
            --out=json=results.json

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json
